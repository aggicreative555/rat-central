<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Rat Central | Register page </title>
    <meta name="description" content="Become a part of the rat family!"/>

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />
    <link rel="manifest" href="/site.webmanifest" />

    <link href="../../src/css/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>
  <body class="bg-background-light text-text-dark">
    <header class="flex w-full justify-center">
      <div
        class="m-4 flex h-fit w-screen content-center justify-between px-10 py-4 text-lg font-semibold"
      >
        <div class="flex justify-start">
          <a
            href="./index.html"
            class="align-center"
            title="Home"
            aria-label="Home link"
            ><img src="/images/logo-full.svg" alt="Rat Central Logo"
          /></a>
        </div>
        <div
          class="right-20 m-4 content-center justify-end lg:hidden"
          id="toggleBtn"
        >
          <button
            id="hamburger"
            class="transition-all duration-300 ease-in-out"
          >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button
            id="closeBtn"
            class="hidden transition-all duration-300 ease-in-out"
          >
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="hidden animate-fade-in content-center" id="navToggler">
          <a
            href="/post/"
            title="Explore page"
            aria-label="Explore page"
            class="link"
            >Explore</a
          >
          <a
            href="/auth/login/"
            title="Login page"
            aria-label="Login page"
            class="btn-accent"
            >Login</a
          >
          <a
            href="/auth/register/"
            title="Register page"
            aria-label="Register page"
            class="link"
            >Register</a
          >
          <button
            id="modeToggler"
            title="Dark/light theme button"
            aria-label="Dark or light theme toggle"
          >
            <span id="lightIcon" class="material-symbols-rounded"
              >brightness_4</span
            >
            <span id="darkIcon" class="material-symbols-rounded hidden"
              >brightness_low</span
            >
          </button>
        </nav>
      </div>
    </header>

    <main
      class="mx-auto my-8 flex h-auto flex-col items-center justify-center px-4"
    >
      <h1
        id="animatedHeading"
        class="light-mode-gradient animate-gradient-xy bg-clip-text text-center text-4xl font-extrabold capitalize leading-relaxed text-transparent"
      >
        Register a new user
      </h1>
      <div class="flex flex-col">
        <form name="register" id="registerForm">
          <div class="my-8 flex flex-col justify-center gap-2">
            <label class="font-medium text-text-dark" for="name"
              >Username</label
            >
            <input
              class="input-default"
              id="name"
              type="text"
              name="name"
              maxlength="20"
              pattern="^[\w]+$"
              title="Please enter a username using only letters and numbers"
              placeholder="user_123"
              required
            />
          </div>

          <div class="my-8 flex flex-col gap-2">
            <label class="font-medium text-text-dark" for="email">Email</label>
            <input
              class="input-default"
              id="email"
              type="email"
              name="email"
              placeholder="student@stud.noroff.no"
              pattern="^[\w\-.]+@(stud\.)?noroff\.no$"
              title="Please enter a valid noroff.no or stud.noroff.no address"
              required
            />
          </div>

          <div class="my-8 flex flex-col gap-3">
            <label class="font-medium text-text-dark" for="password"
              >Password</label
            >
            <input
              class="input-default"
              type="password"
              name="password"
              id="password"
              placeholder="*******"
              minlength="8"
              required
            />
          </div>
          <div class="flex flex-col gap-4">
            <button class="btn-primary mt-2" type="submit">Register</button>
            <h2 class="mt-8 text-center text-xl font-semibold">
              Already a user?
            </h2>
            <a class="btn-secondary" href="/auth/login/">Login</a>
          </div>
        </form>
      </div>
    </main>
    <script type="module" src="../../src/app.js"></script>
    <script type="module" src="../../src/js/router/views/register.js"></script>
  </body>
</html>
