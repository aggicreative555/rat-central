<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Rat Central | Explore ultimate rat hacks! </title>
    <meta name="description" content="Thank you for being a part of rat central! Explore content from the sewers, deeper than the Paris catacombs! "/>

    
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />
    <link rel="manifest" href="/site.webmanifest" />


    <link href="../src/css/style.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>
  <body class="bg-background-light text-text-dark">
    <header class="flex w-full justify-center">
      <div
        class="m-4 flex h-fit w-screen content-center justify-between px-10 py-4 text-lg font-semibold"
      >
        <div class="flex justify-start">
          <a
            href="./index.html"
            class="align-center"
            title="Home"
            aria-label="Home link"
            ><img src="/images/logo-full.svg" alt="Rat Central Logo"
          /></a>
        </div>
        <div
          class="right-20 m-4 content-center justify-end lg:hidden"
          id="toggleBtn"
        >
          <button
            id="hamburger"
            class="transition-all duration-300 ease-in-out"
          >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button
            id="closeBtn"
            class="hidden transition-all duration-300 ease-in-out"
          >
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="hidden animate-fade-in content-center" id="navToggler">
          <a
            href="/post/"
            title="Explore page"
            aria-label="Explore page"
            class="link"
            >Explore</a
          >
          <a
            href="/auth/login/"
            title="Login page"
            aria-label="Login page"
            class="btn-accent"
            >Login</a
          >
          <a
            href="/auth/register/"
            title="Register page"
            aria-label="Register page"
            class="link"
            >Register</a
          >
          <button
            id="modeToggler"
            title="Dark/light theme button"
            aria-label="Dark or light theme toggle"
          >
            <span id="lightIcon" class="material-symbols-rounded"
              >brightness_4</span
            >
            <span id="darkIcon" class="material-symbols-rounded hidden"
              >brightness_low</span
            >
          </button>
        </nav>
      </div>
    </header>
    <main class="flex flex-col">
      <div id="mutiplePostsContent" class="block">
        <h1
          id="animatedHeading"
          class="light-mode-gradient animate-gradient-xy bg-clip-text text-center font-display text-4xl text-transparent md:text-6xl"
        >
          Explore
        </h1>
        <div id="searchBar" class="m-10 flex justify-center gap-8 p-5">
          <div
            class="flex flex-col gap-10 rounded-md border-2 border-solid border-brown-700/20 px-2 py-2 text-center font-semibold capitalize md:flex-row md:rounded-full dark:bg-brown-500 dark:text-text-light"
          >
            <select
              id="searchType"
              class="bg-transparent p-4 px-5 font-semibold text-text-dark"
            >
              <option value="title" selected disabled>Search by</option>
              <option value="title">Title</option>
              <option value="tag">Tag</option>
            </select>
            <input
              type="text"
              id="searchQuery"
              placeholder="Enter your search query"
              class="m-3 rounded-full bg-transparent p-4 placeholder:text-brown-500 md:p-2"
            />
            <button id="searchButton" class="btn-accent hover:text-text-light">
              Search
            </button>
          </div>
        </div>
        <div class="m-8 flex justify-center">
          <a href="/post/create/" class="btn-accent"
            >Post Something<span
              class="material-symbols-rounded pl-2 text-center align-middle"
              >add</span
            ></a
          >
        </div>
      </div>

      <div id="postsContainer" class="posts-container"></div>
    </main>
    <script type="module" src="../src/app.js"></script>
    <script type="module" src="../src/js/router/views/post.js"></script>
  </body>
</html>
