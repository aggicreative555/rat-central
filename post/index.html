<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noroff FED2 JS2 CA</title>
    <link href="./src/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"/>
  </head>
  <body class="bg-background-light text-text-dark">
    <header class="w-full flex justify-center">
      <div class="py-4 px-10 h-fit w-screen m-4 flex justify-between content-center font-semibold text-lg">
        <div class="flex justify-start">
          <a href="./index.html" class="align-center" title="Home" aria-label="Home link"><img src="/images/logo-full.svg" alt="Rat Central Logo"/></a>
        </div>
        <div class="lg:hidden justify-end content-center m-4 right-20" id="toggleBtn">
          <button id="hamburger" class="transition-all duration-300 ease-in-out" >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button id="closeBtn" class="hidden transition-all duration-300 ease-in-out">
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="content-center hidden animate-fade-in" id="navToggler">
          <a href="/post/" title="Explore page" aria-label="Explore page" class="link">Explore</a>
          <a href="/auth/login/" title="Login page" aria-label="Login page" class="btn-accent">Login</a>
          <a href="/auth/register/" title="Register page" aria-label="Register page" class="link">Register</a>
          <button id="mode-toggler" title="Dark/light theme button" aria-label="Dark or light theme toggle">
            <span class="material-symbols-rounded">brightness_4</span>
            <span class="hidden material-symbols-rounded">brightness_low</span>
          </button>
        </nav>
      </div>
    </header>
    <main>

      <h1>Post Page</h1>
      <a href="/post/create/">Create A Post</a><br />
      <a href="/post/">See All Posts</a>
      <div id="searchBar">
        <select id="searchType">
          <option value="title">Title or Content</option>
          <option value="tag">Tag</option>
        </select>
        <input
          type="text"
          id="searchQuery"
          placeholder="Enter your search query"
        />
        <button id="searchButton">Search</button>
      </div>
  
      <div class="postsContainer" id="postsContainer"></div>
  
      <script type="module" src="/src/app.js"></script>
    </main>
  </body>
</html>
