<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Rat Central | My profile </title>
    <meta name="description" content="Looking ratty today! Update your profile for other rats to see!"/>


    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />
    <link rel="manifest" href="/site.webmanifest" />


    <link href="../src/css/style.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>
  <body class="bg-background-light text-text-dark transition-all duration-300">
    <header class="flex w-full justify-center">
      <div
        class="m-4 flex h-fit w-screen content-center justify-between px-10 py-4 text-lg font-semibold"
      >
        <div class="flex justify-start">
          <a
            href="/"
            class="align-center"
            title="Home"
            aria-label="Home link"
            id="logo"
            ><img src="/images/logo-full.svg" alt="Rat Central Logo"
          /></a>
        </div>
        <div
          class="right-20 m-4 content-center justify-end lg:hidden"
          id="toggleBtn"
        >
          <button
            id="hamburger"
            class="transition-all duration-300 ease-in-out"
          >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button
            id="closeBtn"
            class="hidden transition-all duration-300 ease-in-out"
          >
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="hidden animate-fade-in content-center" id="navToggler">
          <a
            href="/post/"
            title="Explore page"
            aria-label="Explore page"
            class="link"
            >Explore</a
          >
          <a
            href="/auth/login/"
            title="Login page"
            aria-label="Login page"
            class="btn-accent"
            >Login</a
          >
          <a
            href="/auth/register/"
            title="Register page"
            aria-label="Register page"
            class="link"
            >Register</a
          >
          <button
            id="modeToggler"
            title="Dark/light theme button"
            aria-label="Dark or light theme toggle"
          >
            <span id="lightIcon" class="material-symbols-rounded"
              >brightness_4</span
            >
            <span id="darkIcon" class="material-symbols-rounded hidden"
              >brightness_low</span
            >
          </button>
        </nav>
      </div>
    </header>
    <main class="flex w-screen justify-center">
      <div class="my-4 flex flex-col text-center">
        <div
          class="m-10 mx-auto size-32 rounded-full bg-brown-800/30 bg-cover bg-center p-10 shadow-md shadow-brown-800/20 hover:bg-blend-overlay"
          id="profilePic"
        ></div>
        <h1
          id="animatedHeading"
          class="light-mode-gradient animate-gradient-xy bg-clip-text text-center font-display text-xl text-transparent md:text-4xl"
        >
          Welcome
        </h1>
        <h2
          id="animatedHeading"
          class="light-mode-gradient animate-gradient-xy bg-clip-text text-center font-display text-4xl text-transparent md:text-6xl"
        ></h2>
        <p id="emailAccount" class="text-sm font-medium text-brown-800/60"></p>
        <p
          class="text-l w-fill my-10 h-32 rounded-md p-4 text-brown-800/60 transition-all duration-300 hover:border-2 hover:border-brown-500"
        >
          Write a few words about yourself...
        </p>
        <button class="btn-secondary">Edit Profile</button>
        <button id="logoutButton" class="btn-primary my-10">Log out</button>
      </div>
    </main>
    <script type="module" src="../src/app.js"></script>
    <script type="module" src="../src/js/router/views/profile.js"></script>
  </body>
</html>
