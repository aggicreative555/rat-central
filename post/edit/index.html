<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Rat Central | Edit your post </title>
    <meta name="description" content="Made a new discovery? Edit your post to keep all rats up to date!"/>

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />
    <link rel="manifest" href="/site.webmanifest" />


    <link href="../src/css/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>
  <body class="bg-background-light text-text-dark">
    <header class="w-full flex justify-center">
      <div class="py-4 px-10 h-fit w-screen m-4 flex justify-between content-center font-semibold text-lg">
        <div class="flex justify-start">
          <a href="/" class="align-center" title="Home" aria-label="Home link" id="logo"><img src="/images/logo-full-01.svg" alt="Rat Central Logo"/></a>
        </div>
        <div class="lg:hidden justify-end content-center m-4 right-20" id="toggleBtn">
          <button id="hamburger" class="transition-all duration-300 ease-in-out" >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button id="closeBtn" class="hidden transition-all duration-300 ease-in-out">
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="content-center hidden animate-fade-in" id="navToggler">
          <a href="/post/" title="Explore page" aria-label="Explore page" class="link">Explore</a>
          <a href="/auth/login/" title="Login page" aria-label="Login page" class="btn-accent">Login</a>
          <a href="/auth/register/" title="Register page" aria-label="Register page" class="link">Register</a>
          <button id="modeToggler" title="Dark/light theme button" aria-label="Dark or light theme toggle">
            <span id="lightIcon" class="material-symbols-rounded">brightness_4</span>
            <span id="darkIcon" class="hidden material-symbols-rounded">brightness_low</span>
          </button>
        </nav>
      </div>
    </header>
    <main>
      <h1 id="animatedHeading" class="font-display text-transparent text-center text-4xl md:text-6xl bg-clip-text animate-gradient-xy light-mode-gradient dark:dark-mode-gradient">Edit Post</h1>

      <div class="flex mb-20 w-screen justify-center">
        <form name="updatePost" id="updatePost" class="w-fit flex flex-col gap-10 mt-10 text-textDark dark:text-textBrown dark:bg-amber-900/20 md:p-20 p-5 ">
          <div class="flex flex-col gap-2">
            <label for="title" class="font-medium"  >Post Title</label>
            <input class="input-default" type="text" name="title" placeholder="Title">
          </div>

          <div class="flex flex-col gap-2">
            <label for="content" class="font-medium" >Content</label>
            <textarea class="input-default" name="content" placeholder="Content" cols="30" rows="10"></textarea>
          </div>

          <div class="flex flex-col gap-2">
            <label for="url" class="font-medium" >Add image url</label>
            <input class="input-default" type="url" name="url"  placeholder="url">
          </div>

          <div class="flex flex-col gap-2">
            <label for="alt" class="font-medium" >Add image alt text</label>
            <input class="input-default" type="text" name="alt" placeholder="alt">
          </div>

          <div class="flex flex-col gap-2">
            <label for="tags" class="font-medium" >Add tags</label>
            <input class="input-default" type="text" name="tags" placeholder="tag 1, tag 2">
          </div>

          <button type="submit" id="updateButton" class="btn-primary mt-10">Update Post</button>
          <button id="deleteButton" class="btn-secondary ml-auto mt-10" title="Delete Post"><span class="material-symbols-rounded">delete</span></button>
        </form>
      </div>
    </main>
  <script type="module" src="../../src/app.js"></script>
  <script type="module" src="../../src/js/router/views/postEdit.js"></script>
  </body>
</html>
