<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> RAT CENTRAL </title>
    <meta name="description" content="See what content lurks in the deepest sewers, deeper than the Paris catacombs... Become a part of RAT CENTRAL to feed & share!"/>


    <link rel="icon" type="image/png" href="images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />
    <link rel="manifest" href="/site.webmanifest" />

    
    <link href="/src/css/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>

  <body class="bg-background-light text-text-dark dark:bg-background-dark dark:text-text-light w-container">
    <header class="w-full flex justify-center">
      <div class="py-4 px-10 h-fit w-screen m-4 flex justify-between content-center font-semibold text-lg">
        <div class="flex justify-start">
          <a href="/index.html" class="align-center" title="Home" aria-label="Home link"><img src="/images/logo-full-01.svg" alt="Rat Central Logo"/></a>
        </div>
        <div class="lg:hidden justify-end content-center m-4 right-20" id="toggleBtn">
          <button id="hamburger" class="transition-all duration-300 ease-in-out" >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button id="closeBtn" class="hidden transition-all duration-300 ease-in-out">
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="content-center hidden animate-fade-in" id="navToggler">
          <a href="/post/" title="Explore page" aria-label="Explore page" class="link">Explore</a>
          <a href="/auth/login/" title="Login page" aria-label="Login page" class="btn-accent">Login</a>
          <a href="/auth/register/" title="Register page" aria-label="Register page" class="link">Register</a>
          <button id="modeToggler" title="Dark/light theme button" aria-label="Dark or light theme toggle">
            <span id="lightIcon" class="material-symbols-rounded">brightness_4</span>
            <span id="darkIcon" class="hidden material-symbols-rounded">brightness_low</span>
          </button>
        </nav>
      </div>
    </header>
    
    <main class="flex flex-col justify-center items-center">
      <div class="flex-column align-center justify-center py-8">
        <h1 id="animatedHeading" class="font-display text-transparent text-center text-2xl md:text-4xl bg-clip-text animate-gradient-xy light-mode-gradient">Welcome to</h1>
        <h2 id="textAnimation" class="slideUp-animation font-display text-transparent text-center text-3xl md:text-8xl bg-clip-text animate-gradient-xy display-gradient duration-75 cursor-default">rat</h2> 
        <h3 class="font-display text-transparent text-center text-3xl md:text-6xl bg-clip-text animate-gradient-xy light-mode-gradient">central</h3>
      </div>
      <div id="animatedPosts" class="container h-full w-screen px-10 flex gap-6 flex-wrap justify-center align-middle group">
        <div id="post1" class="slideUp-animation relative w-full min-h-96 max-h-96 max-w-80 bg-background-light rounded-lg shadow-lg shadow-brown-700/20 overflow-hidden  m-4">
          <div class="bg-blend-overlay bg-brown-900/40 w-full hover:bg-brown-900/10 transition-all duration-200 h-full bg-cover bg-top ">
            
          </div>
        </div>
        <div id="post2" class="slideUp-animation relative mt-20 w-full min-h-96 max-h-96 max-w-80 bg-background-light rounded-lg shadow-lg shadow-brown-700/20 overflow-hidden group m-4">
          <div class="bg-blend-overlay bg-brown-900/40 hover:bg-brown-900/10 transition-all duration-200 w-full h-full bg-cover bg-top ">

          </div>
        </div>
        <div id="post3" class="slideUp-animation relative w-full min-h-96 max-h-96 max-w-80 bg-background-light rounded-lg shadow-lg shadow-brown-700/20 overflow-hidden group m-4">
          <div class="bg-blend-overlay bg-brown-900/40 hover:bg-brown-900/10 transition-all duration-200 w-full h-full bg-cover bg-top ">

          </div>
        </div>
      </div>
    </main>
  <script type="module" src="/src/app.js"></script>
  </body>
</html>
