<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Rat Central | Explore ultimate rat hacks! </title>
    <meta name="description" content="Thank you for being a part of rat central! Explore content from the sewers, deeper than the Paris catacombs! "/>

    
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />


    <link href="../src/css/style.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>
  <body class="bg-backgroundLight text-text-dark dark:bg-backgroundDark dark:text-textBrown">
    <header class="w-full flex justify-center dark:bg-amber-900/20 ">
      <div class="py-4 px-10 h-fit w-screen m-4 flex justify-between content-center font-semibold text-lg">
        <div class="flex justify-start">
          <a href="/" class="align-center" title="Home" aria-label="Home link" id="logo"><img src="/images/logo-full-01.svg" alt="Rat Central Logo" id="logoImg"/></a>
        </div>
        <div class="lg:hidden justify-end content-center m-4 right-20 dark:text-textBrown" id="toggleBtn">
          <button id="hamburger" class="transition-all duration-300 ease-in-out" >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button id="closeBtn" class="hidden transition-all duration-300 ease-in-out">
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="content-center hidden animate-fade-in dark:text-textBrown" id="navToggler">
          <a href="/post/" title="Explore page" aria-label="Explore page" class="link">Explore</a>
          <a href="/auth/login/" title="Login page" aria-label="Login page" class="btn-accent">Login</a>
          <a href="/auth/register/" title="Register page" aria-label="Register page" class="link">Register</a>
          <button id="modeToggler" title="Dark/light theme button" aria-label="Dark or light theme toggle">
            <span id="lightIcon" class="material-symbols-rounded">brightness_4</span>
            <span id="darkIcon" class="hidden material-symbols-rounded">brightness_low</span>
          </button>
        </nav>
      </div>
    </header>
    <main class="flex flex-col items-center md:px-10">
      <div id="mutiplePostsContent" class="block">
        <h1 id="animatedHeading" class="font-display text-transparent text-center text-4xl md:text-6xl bg-clip-text animate-gradient-xy light-mode-gradient dark:dark-mode-gradient md:mt-20 mt-10">Explore</h1>
        <div id="searchBar" class="flex justify-center m-10 p-5 gap-8">
          <div class=" flex flex-col md:flex-row md:rounded-full gap-10 border-solid border-2 border-brown-700/20 dark:bg-brown-500 dark:text-text-light py-2 px-2 text-center rounded-md font-semibold capitalize">
            <select id="searchType" class="text-text-dark dark:text-textBrown px-5 font-semibold bg-transparent p-4">
              <option value="title" selected disabled>Search by</option>
              <option value="title">Title</option>
              <option value="tag">Tag</option>
            </select>
            <input
              type="text"
              id="searchQuery"
              placeholder="Enter your search query"
              class="placeholder:text-brown-500 dark:placeholder:text-textBrown bg-transparent m-3 p-4 md:p-2 rounded-full"
            />
            <button id="searchButton" class="btn-accent dark:bg-amber-950 hover:text-text-light">Search
            </button>
          </div>
        </div>
        <div class="flex justify-center m-8"><a href="/post/create/" class="btn-accent">Post Something<span class="material-symbols-rounded text-center align-middle pl-2">add</span></a></div>
      </div>

  
      <div id="postsContainer" class="posts-container h-fit w-full px-5 pb-20"></div>
    </main>
    <script type="module" src="../src/app.js"></script>
    <script type="module" src="../src/js/router/views/post.js"></script>
  </body>
</html>
