<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Rat Central | My profile </title>
    <meta name="description" content="Looking ratty today! Update your profile for other rats to see!"/>


    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Rat Central" />
    <link rel="manifest" href="/site.webmanifest" />


    <link href="../src/css/style.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&"
    />
  </head>
  <body class="bg-backgroundLight text-text-dark dark:bg-backgroundDark dark:text-textLight transition-all duration-300">
    <header class="w-full flex justify-center">
      <div class="py-4 px-10 h-fit w-screen m-4 flex justify-between content-center font-semibold text-lg">
        <div class="flex justify-start">
          <a href="/" class="align-center" title="Home" aria-label="Home link" id="logo"><img src="/images/logo-full-01.svg" alt="Rat Central Logo" id="logoImg"/></a>
        </div>
        <div class="lg:hidden justify-end content-center m-4 right-20" id="toggleBtn">
          <button id="hamburger" class="transition-all duration-300 ease-in-out" >
            <span class="material-symbols-rounded text-4xl">menu</span>
          </button>
          <button id="closeBtn" class="hidden transition-all duration-300 ease-in-out">
            <span class="material-symbols-rounded text-4xl">close</span>
          </button>
        </div>
        <nav class="content-center hidden animate-fade-in" id="navToggler">
          <a href="/post/" title="Explore page" aria-label="Explore page" class="link">Explore</a>
          <a href="/auth/login/" title="Login page" aria-label="Login page" class="btn-accent">Login</a>
          <a href="/auth/register/" title="Register page" aria-label="Register page" class="link">Register</a>
          <button id="modeToggler" title="Dark/light theme button" aria-label="Dark or light theme toggle">
            <span id="lightIcon" class="material-symbols-rounded">brightness_4</span>
            <span id="darkIcon" class="hidden material-symbols-rounded">brightness_low</span>
          </button>
        </nav>
      </div>
    </header>
    <main class="flex w-screen justify-center">
      <div class="flex flex-col text-center my-4 dark:bg-amber-900/20 md:w-[500px] md:px-20 px-5">
        <div class="size-32 bg-brown-800/30 rounded-full p-10 m-10 mx-auto bg-cover bg-center shadow-md shadow-brown-800/20 hover:bg-blend-overlay" id="profilePic">
        </div>
        <h1 id="animatedHeading" class="font-display text-transparent text-center text-xl md:text-4xl bg-clip-text animate-gradient-xy light-mode-gradient dark:dark-mode-gradient">Welcome</h1>
        <h2 id="animatedHeading" class="font-display text-transparent text-center text-4xl md:text-6xl bg-clip-text animate-gradient-xy light-mode-gradient dark:dark-mode-gradient"></h2>
        <p id="emailAccount" class="text-sm font-medium text-brown-800/60 dark:text-textBrown"></p>
        <p class="text-l text-brown-800/60 h-32 w-fill my-10 p-4 rounded-md transition-all duration-300 dark:text-textBrown cursor-default">Write a few words about yourself...</p>
        <button id="logoutButton" class="btn-primary my-10">Log out</button>
      </div>
    </main>
    <script type="module" src="../src/app.js"></script>
    <script type="module" src="../src/js/router/views/profile.js"></script>
  </body>
</html>
